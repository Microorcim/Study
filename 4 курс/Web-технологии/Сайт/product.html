<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар — SportShop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">SportShop</a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="catalog.html" class="nav__link">Каталог</a>
        <a href="about.html" class="nav__link">О магазине</a>
        <a href="contacts.html" class="nav__link">Контакты</a>
        <a href="cart.html" class="nav__link nav__link--cart">
          Корзина <span class="cart-count" id="headerCartCount">0</span>
        </a>
      </nav>
      <button class="burger" id="burger" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="main--product">
    <div class="container">
      <nav class="breadcrumbs" id="breadcrumbs">
        <a href="index.html">Главная</a>
        <span class="breadcrumbs__sep">/</span>
        <a href="catalog.html">Каталог</a>
        <span class="breadcrumbs__sep">/</span>
        <span id="breadcrumbProduct">Товар</span>
      </nav>

      <article class="product-detail" id="productDetail">
        <div class="product-detail__gallery">
          <img src="" alt="" class="product-detail__img" id="productImage">
        </div>
        <div class="product-detail__info">
          <p class="product-detail__category" id="productCategory"></p>
          <h1 class="product-detail__title" id="productTitle"></h1>
          <p class="product-detail__brand" id="productBrand"></p>
          <div class="product-detail__prices">
            <span class="product-detail__price" id="productPrice"></span>
            <span class="product-detail__old-price" id="productOldPrice"></span>
          </div>
          <p class="product-detail__stock" id="productStock"></p>
          <p class="product-detail__desc" id="productDesc"></p>
          <dl class="product-detail__specs" id="productSpecs"></dl>
          <div class="product-detail__actions">
            <div class="product-detail__qty">
              <label>Количество:</label>
              <input type="number" class="input input--small" id="productQty" value="1" min="1" max="99">
            </div>
            <button type="button" class="btn btn--primary btn--lg" id="addToCartBtn">Добавить в корзину</button>
          </div>
        </div>
      </article>

      <section class="section">
        <h2 class="section__title">Похожие товары</h2>
        <div class="products-grid" id="relatedProducts">
          <!-- заполняется JS -->
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">© 2025 SportShop. Учебный проект по Web-технологиям.</p>
      <a href="admin-login.html" class="footer__admin">Вход для администратора</a>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
