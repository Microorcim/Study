<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — SportShop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">SportShop</a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="catalog.html" class="nav__link">Каталог</a>
        <a href="about.html" class="nav__link">О магазине</a>
        <a href="contacts.html" class="nav__link">Контакты</a>
        <a href="cart.html" class="nav__link nav__link--cart">
          Корзина <span class="cart-count" id="headerCartCount">0</span>
        </a>
      </nav>
      <button class="burger" id="burger" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="main--checkout">
    <div class="container">
      <nav class="breadcrumbs">
        <a href="index.html">Главная</a>
        <span class="breadcrumbs__sep">/</span>
        <a href="cart.html">Корзина</a>
        <span class="breadcrumbs__sep">/</span>
        <span>Оформление заказа</span>
      </nav>

      <h1 class="page-title">Оформление заказа</h1>

      <div class="checkout-empty hidden" id="checkoutEmpty">
        <p>Корзина пуста. Добавьте товары в корзину.</p>
        <a href="catalog.html" class="btn btn--primary">В каталог</a>
      </div>

      <div class="checkout-layout" id="checkoutLayout">
        <form class="checkout-form form" id="checkoutForm" novalidate>
          <div class="form__group">
            <label class="form__label" for="fio">ФИО <span class="required">*</span></label>
            <input type="text" class="input" id="fio" name="fio" required placeholder="Иванов Иван Иванович">
            <span class="form__error" id="errorFio"></span>
          </div>
          <div class="form__group">
            <label class="form__label" for="phone">Телефон <span class="required">*</span></label>
            <input type="tel" class="input" id="phone" name="phone" required placeholder="+7 (999) 123-45-67">
            <span class="form__error" id="errorPhone"></span>
          </div>
          <div class="form__group">
            <label class="form__label" for="email">Email <span class="required">*</span></label>
            <input type="email" class="input" id="email" name="email" required placeholder="email@example.com">
            <span class="form__error" id="errorEmail"></span>
          </div>
          <div class="form__group">
            <label class="form__label" for="address">Адрес доставки <span class="required">*</span></label>
            <input type="text" class="input" id="address" name="address" required placeholder="Город, улица, дом, квартира">
            <span class="form__error" id="errorAddress"></span>
          </div>
          <div class="form__group">
            <label class="form__label" for="comment">Комментарий к заказу</label>
            <textarea class="input input--textarea" id="comment" name="comment" rows="3" placeholder="Необязательно"></textarea>
          </div>
          <button type="submit" class="btn btn--primary btn--lg btn--block">Подтвердить заказ</button>
        </form>

        <aside class="checkout-summary">
          <h3>Ваш заказ</h3>
          <div class="checkout-summary__list" id="checkoutSummaryList"></div>
          <div class="checkout-summary__total">
            <span>Итого:</span>
            <strong id="checkoutTotal">0 ₽</strong>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">© 2025 SportShop. Учебный проект по Web-технологиям.</p>
      <a href="admin-login.html" class="footer__admin">Вход для администратора</a>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
