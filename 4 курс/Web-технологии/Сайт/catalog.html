<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — SportShop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">SportShop</a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="catalog.html" class="nav__link nav__link--active">Каталог</a>
        <a href="about.html" class="nav__link">О магазине</a>
        <a href="contacts.html" class="nav__link">Контакты</a>
        <a href="cart.html" class="nav__link nav__link--cart">
          Корзина <span class="cart-count" id="headerCartCount">0</span>
        </a>
      </nav>
      <button class="burger" id="burger" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="main--catalog">
    <div class="container">
      <nav class="breadcrumbs">
        <a href="index.html">Главная</a>
        <span class="breadcrumbs__sep">/</span>
        <span>Каталог</span>
      </nav>

      <h1 class="page-title">Каталог товаров</h1>

      <div class="catalog-layout">
        <aside class="filters">
          <div class="filters__block">
            <label class="filters__label">Поиск</label>
            <input type="text" class="input" id="searchInput" placeholder="Название товара...">
          </div>
          <div class="filters__block">
            <label class="filters__label">Категория</label>
            <select class="input" id="filterCategory">
              <option value="">Все категории</option>
              <!-- заполняется JS -->
            </select>
          </div>
          <div class="filters__block">
            <label class="filters__label">Цена, ₽</label>
            <div class="filters__range">
              <input type="number" class="input input--small" id="priceMin" placeholder="От" min="0">
              <span>—</span>
              <input type="number" class="input input--small" id="priceMax" placeholder="До" min="0">
            </div>
          </div>
          <div class="filters__block">
            <label class="filters__label">Сортировка</label>
            <select class="input" id="sortSelect">
              <option value="default">По умолчанию</option>
              <option value="price-asc">Цена: по возрастанию</option>
              <option value="price-desc">Цена: по убыванию</option>
              <option value="name-asc">Название: А–Я</option>
              <option value="name-desc">Название: Я–А</option>
            </select>
          </div>
          <button type="button" class="btn btn--outline btn--block" id="resetFilters">Сбросить фильтры</button>
        </aside>

        <div class="catalog-content">
          <p class="catalog-results" id="catalogResults">Загрузка...</p>
          <div class="products-grid" id="catalogProducts">
            <!-- заполняется JS -->
          </div>
          <p class="catalog-empty hidden" id="catalogEmpty">По вашему запросу товаров не найдено. Попробуйте изменить фильтры.</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">© 2025 SportShop. Учебный проект по Web-технологиям.</p>
      <a href="admin-login.html" class="footer__admin">Вход для администратора</a>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
