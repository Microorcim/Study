<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог — SportStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <span class="logo-mark">Sport</span><span class="logo-accent">Store</span>
        </a>
        <nav class="main-nav">
            <a href="catalog.html">Каталог</a>
            <a href="catalog.html?popular=1">Популярное</a>
            <a href="catalog.html?new=1">Новинки</a>
        </nav>
        <div class="header-actions">
            <form class="search-form" action="catalog.html">
                <input type="text" name="q" placeholder="Поиск по товарам..." required>
                <button type="submit">Найти</button>
            </form>
            <a href="cart.html" class="icon-button cart-link">Корзина</a>
        </div>
    </div>
</header>
<main class="site-main">
    <section class="section">
        <div class="container">
            <h1 class="section-title section-title-centered">Каталог товаров</h1>

            <form id="filter-form" class="filters">
                <div class="filter-header">Фильтр</div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="filter-category">Категория</label>
                        <select id="filter-category" name="category">
                            <option value="">Все категории</option>
                            <!-- Категории подгружаются через JS -->
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-min-price">Цена от</label>
                        <input type="number" id="filter-min-price" name="min_price" min="0" step="1">
                    </div>
                    <div class="filter-group">
                        <label for="filter-max-price">Цена до</label>
                        <input type="number" id="filter-max-price" name="max_price" min="0" step="1">
                    </div>
                    <div class="filter-group">
                        <label for="filter-brand">Назначение / бренд</label>
                        <input type="text" id="filter-brand" name="brand" placeholder="Например: бег, фитнес">
                    </div>
                </div>
                <div class="filter-actions">
                    <button type="submit" class="btn btn-primary">Применить</button>
                    <button type="button" id="reset-filters" class="btn btn-ghost">Сбросить</button>
                </div>
            </form>

            <div id="catalog-products" class="product-grid">
                <!-- Список товаров загружается через JS из PHP-API -->
            </div>
        </div>
    </section>
</main>
<footer class="site-footer">
    <div class="container footer-inner">
        <div class="footer-column">
            <div class="logo footer-logo">
                <span class="logo-mark">Sport</span><span class="logo-accent">Store</span>
            </div>
            <p class="footer-text">Современный интернет-магазин спортивных товаров.</p>
        </div>
        <div class="footer-column">
            <h4>Навигация</h4>
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="cart.html">Корзина</a>
        </div>
        <div class="footer-column">
            <h4>Контакты</h4>
            <p>Email: info@sportstore.local</p>
            <p>Телефон: +7 (900) 000-00-00</p>
        </div>
    </div>
    <div class="footer-bottom">
        <div class="container">
            <p>© <span id="footer-year"></span> SportStore. Все права защищены.</p>
        </div>
    </div>
</footer>
<script src="script.js"></script>
</body>
</html>
