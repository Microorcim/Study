<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — SportShop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="body--admin">
  <header class="admin-header">
    <div class="container admin-header__inner">
      <span class="admin-header__logo">SportShop — Админ</span>
      <nav class="admin-header__nav">
        <a href="index.html" class="admin-header__link">На сайт</a>
        <button type="button" class="btn btn--outline btn--sm" id="adminLogout">Выйти</button>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">
      <ul class="admin-tabs" id="adminTabs">
        <li><button type="button" class="admin-tabs__btn active" data-tab="products">Товары</button></li>
        <li><button type="button" class="admin-tabs__btn" data-tab="orders">Заказы</button></li>
      </ul>

      <section class="admin-section active" id="section-products">
        <div class="admin-section__toolbar">
          <input type="text" class="input admin-search" id="adminProductSearch" placeholder="Поиск по названию...">
          <select class="input input--sm" id="adminCategoryFilter">
            <option value="">Все категории</option>
            <!-- заполняется JS -->
          </select>
          <button type="button" class="btn btn--primary" id="adminAddProduct">Добавить товар</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="adminProductsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Фото</th>
                <th>Название</th>
                <th>Категория</th>
                <th>Цена</th>
                <th>Наличие</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="adminProductsBody">
              <!-- заполняется JS -->
            </tbody>
          </table>
        </div>
      </section>

      <section class="admin-section" id="section-orders">
        <div class="admin-table-wrap">
          <table class="admin-table" id="adminOrdersTable">
            <thead>
              <tr>
                <th>№ заказа</th>
                <th>Дата</th>
                <th>Клиент</th>
                <th>Сумма</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="adminOrdersBody">
              <!-- заполняется JS -->
            </tbody>
          </table>
        </div>
        <p class="admin-empty hidden" id="adminOrdersEmpty">Заказов пока нет.</p>
      </section>
    </div>
  </main>

  <!-- Модальное окно: добавление/редактирование товара -->
  <div class="modal hidden" id="productModal">
    <div class="modal__backdrop" data-close="productModal"></div>
    <div class="modal__content modal__content--wide">
      <div class="modal__header">
        <h2 class="modal__title" id="productModalTitle">Добавить товар</h2>
        <button type="button" class="modal__close" data-close="productModal" aria-label="Закрыть">&times;</button>
      </div>
      <form class="form" id="productForm">
        <input type="hidden" id="productFormId" name="id">
        <div class="form__row">
          <div class="form__group">
            <label class="form__label" for="productName">Название *</label>
            <input type="text" class="input" id="productName" name="name" required>
          </div>
          <div class="form__group">
            <label class="form__label" for="productCategory">Категория *</label>
            <select class="input" id="productCategory" name="category" required>
              <!-- заполняется JS -->
            </select>
          </div>
        </div>
        <div class="form__row">
          <div class="form__group">
            <label class="form__label" for="productBrand">Бренд</label>
            <input type="text" class="input" id="productBrand" name="brand">
          </div>
          <div class="form__group">
            <label class="form__label" for="productPrice">Цена, ₽ *</label>
            <input type="number" class="input" id="productPrice" name="price" required min="0" step="1">
          </div>
        </div>
        <div class="form__group">
          <label class="form__label" for="productImage">URL изображения</label>
          <input type="url" class="input" id="productImage" name="image" placeholder="https://...">
        </div>
        <div class="form__group">
          <label class="form__label" for="productDesc">Описание</label>
          <textarea class="input input--textarea" id="productDesc" name="description" rows="3"></textarea>
        </div>
        <div class="form__group">
          <label class="form__label">
            <input type="checkbox" id="productInStock" name="inStock" checked> В наличии
          </label>
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--outline" data-close="productModal">Отмена</button>
          <button type="submit" class="btn btn--primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
