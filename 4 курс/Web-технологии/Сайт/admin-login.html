<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в админ-панель — SportShop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="body--admin-login">
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <h1 class="admin-login__title">Вход в админ-панель</h1>
      <p class="admin-login__note">Учебная имитация авторизации. Не используется в production.</p>
      <form class="form admin-login-form" id="adminLoginForm">
        <div class="form__group">
          <label class="form__label" for="adminLogin">Логин</label>
          <input type="text" class="input" id="adminLogin" name="login" required autocomplete="username">
        </div>
        <div class="form__group">
          <label class="form__label" for="adminPassword">Пароль</label>
          <input type="password" class="input" id="adminPassword" name="password" required autocomplete="current-password">
        </div>
        <span class="form__error" id="adminLoginError"></span>
        <button type="submit" class="btn btn--primary btn--block btn--lg">Войти</button>
      </form>
      <p class="admin-login__hint">Логин: <code>admin</code>, пароль: <code>admin123</code></p>
      <a href="index.html" class="admin-login__back">← На главную</a>
    </div>
  </div>
  <script src="js/storage.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>
